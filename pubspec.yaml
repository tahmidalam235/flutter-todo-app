name: my_todo_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.1+4

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  google_fonts: ^6.3.1
  intl: ^0.20.2
  flutter_local_notifications: ^19.4.0
  timezone: ^0.10.1
  flutter_timezone: ^4.1.1
  shared_preferences: ^2.5.3
  provider: ^6.1.5
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.6
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/logo/taskies_logo.png
    - assets/logo/app_icon.png

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/logo/app_icon.png

  android: true
  ios: true

  android_12:
    color: "#FFFFFF"
    image: assets/logo/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/app_icon.png"
  min_sdk_android: 21